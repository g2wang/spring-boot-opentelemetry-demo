services:
  inventory-service:
    build:
      context: ./inventory-service
    image: spring-otel-demo/inventory-service:latest
    environment:
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://otel-collector:4318/v1/metrics
    ports:
      - "8082:8082"
    depends_on:
      otel-collector:
        condition: service_started

  order-service:
    build:
      context: ./order-service
    image: spring-otel-demo/order-service:latest
    environment:
      INVENTORY_SERVICE_URL: http://inventory-service:8082
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://otel-collector:4318/v1/metrics
    ports:
      - "8081:8081"
    depends_on:
      inventory-service:
        condition: service_started
      otel-collector:
        condition: service_started

  storefront-service:
    build:
      context: ./storefront-service
    image: spring-otel-demo/storefront-service:latest
    environment:
      ORDER_SERVICE_URL: http://order-service:8081
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://otel-collector:4318/v1/metrics
    ports:
      - "8080:8080"
    depends_on:
      order-service:
        condition: service_started
      otel-collector:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.126.0
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    volumes:
      - ./observability/otel-collector/config.yml:/etc/otelcol-contrib/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      jaeger:
        condition: service_started

  prometheus:
    image: prom/prometheus:v3.3.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      storefront-service:
        condition: service_started
      order-service:
        condition: service_started
      inventory-service:
        condition: service_started
      otel-collector:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.69.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14250:14250"

  grafana:
    image: grafana/grafana:12.0.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
      jaeger:
        condition: service_started
